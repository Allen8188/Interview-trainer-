name: Release Windows Zip

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble package
        run: |
          set -eux
          ROOT="InterviewTrainer-Windows"
          mkdir -p "$ROOT"

          cp -r app "$ROOT"/
          cp -r web "$ROOT"/
          cp -r scripts "$ROOT"/
          cp -r release/windows/. "$ROOT"/
          find "$ROOT" -type d -name "__pycache__" -prune -exec rm -rf {} +
          find "$ROOT" -type f -name "*.pyc" -delete

          cp Dockerfile "$ROOT"/
          cp docker-compose.yml "$ROOT"/
          cp requirements.txt "$ROOT"/
          cp requirements-whisper.txt "$ROOT"/
          cp README.md "$ROOT"/
          cp LAUNCH.md "$ROOT"/

          zip -r "InterviewTrainer-Windows.zip" "$ROOT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InterviewTrainer-Windows
          path: InterviewTrainer-Windows.zip

      - name: Attach to release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: InterviewTrainer-Windows.zip

  build-windows-portable:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        shell: bash
        run: |
          set -eux
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        shell: bash
        run: |
          set -eux
          pyinstaller --noconfirm --clean --onefile \
            --name InterviewTrainer \
            --add-data "web;web" \
            --hidden-import app.main \
            --hidden-import app.engine \
            --hidden-import app.storage \
            --hidden-import app.llm \
            --hidden-import app.stt \
            run_desktop.py

      - name: Assemble portable package
        shell: bash
        run: |
          set -eux
          ROOT="InterviewTrainer-Windows-Portable"
          mkdir -p "$ROOT"
          cp dist/InterviewTrainer.exe "$ROOT"/
          cp release/windows-portable/Launch-Interview-Trainer-NoDocker.bat "$ROOT"/
          cp release/windows-portable/Stop-Interview-Trainer-NoDocker.bat "$ROOT"/
          cp release/windows-portable/README-WINDOWS-NODOCKER.txt "$ROOT"/
          7z a InterviewTrainer-Windows-Portable.zip "$ROOT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InterviewTrainer-Windows-Portable
          path: InterviewTrainer-Windows-Portable.zip

      - name: Attach portable zip to release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: InterviewTrainer-Windows-Portable.zip
